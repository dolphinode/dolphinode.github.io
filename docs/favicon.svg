<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#FFEBEE;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="babyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFAB91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF7043;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- Decorative circle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.2" />

  <!-- Heart shape (care/compassion) -->
  <g transform="translate(256, 230)">
    <path d="M0,-20 C-15,-45 -55,-35 -55,-10 C-55,15 -15,35 0,55 C15,35 55,15 55,-10 C55,-35 15,-45 0,-20Z"
          fill="url(#heartGrad)" opacity="0.9" />
  </g>

  <!-- Baby silhouette inside heart -->
  <g transform="translate(256, 240)">
    <!-- Baby head -->
    <circle cx="0" cy="-8" r="14" fill="url(#babyGrad)" />
    <!-- Baby body -->
    <ellipse cx="0" cy="8" rx="12" ry="10" fill="url(#babyGrad)" />
    <!-- Baby eyes -->
    <circle cx="-5" cy="-10" r="2.5" fill="#FFFFFF" />
    <circle cx="5" cy="-10" r="2.5" fill="#FFFFFF" />
    <!-- Baby smile -->
    <path d="M-4,-4 Q0,0 4,-4" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Stomach / navel dot (stomach piercer service) -->
  <circle cx="256" cy="300" r="6" fill="#FFFFFF" opacity="0.7" />
  <circle cx="256" cy="300" r="3" fill="#FF5252" opacity="0.8" />

  <!-- Small decorative dots (sparkle/care) -->
  <circle cx="140" cy="160" r="4" fill="#FFFFFF" opacity="0.4" />
  <circle cx="372" cy="160" r="4" fill="#FFFFFF" opacity="0.4" />
  <circle cx="140" cy="352" r="4" fill="#FFFFFF" opacity="0.4" />
  <circle cx="372" cy="352" r="4" fill="#FFFFFF" opacity="0.4" />

  <!-- Chinese character 媽 (Mā) - stylized -->
  <text x="256" y="420" text-anchor="middle" font-family="'Microsoft YaHei', 'Noto Sans SC', 'PingFang SC', sans-serif"
        font-size="52" font-weight="bold" fill="#FFFFFF" opacity="0.9" letter-spacing="6">
    媽寶
  </text>

  <!-- Small English subtitle -->
  <text x="256" y="455" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="18" font-weight="300" fill="#FFFFFF" opacity="0.7" letter-spacing="4">
    MABY EASY
  </text>

  <!-- Corner accent lines -->
  <line x1="60" y1="60" x2="100" y2="60" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="60" y1="60" x2="60" y2="100" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="452" y1="60" x2="412" y2="60" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="452" y1="60" x2="452" y2="100" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="60" y1="452" x2="100" y2="452" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="60" y1="452" x2="60" y2="412" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="452" y1="452" x2="412" y2="452" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
  <line x1="452" y1="452" x2="452" y2="412" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round" />
</svg>